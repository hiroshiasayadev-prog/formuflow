<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>formuflow — 04d Sidebar: Contrib / Extensions</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-base: #111118;
    --bg-sidebar: #16161f;
    --bg-hover: rgba(255,255,255,0.05);
    --bg-active: rgba(255,255,255,0.08);
    --bg-selected: rgba(99,102,241,0.18);

    --text-primary: #d4d4dc;
    --text-secondary: #8888a0;
    --text-muted: #555568;

    --accent: #6366f1;
    --accent-light: #a5b4fc;
    --green: #4ade80;
    --amber: #f59e0b;

    --border: rgba(255,255,255,0.07);

    --icon-bar-width: 48px;
    --panel-width: 280px;
  }

  body {
    background: var(--bg-base);
    color: var(--text-primary);
    font-family: 'Menlo', 'Consolas', 'Monaco', monospace;
    font-size: 12px;
    height: 100vh;
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  .menubar {
    height: 30px; background: #0e0e16;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 12px; gap: 20px; flex-shrink: 0;
  }
  .menubar-title { font-size: 12px; font-weight: 600; color: var(--accent-light); letter-spacing: 0.05em; margin-right: 4px; }
  .menubar-item  { font-size: 12px; color: var(--text-secondary); cursor: pointer; padding: 2px 6px; border-radius: 3px; }
  .menubar-item:hover { background: var(--bg-hover); color: var(--text-primary); }

  .app-body { flex: 1; display: flex; overflow: hidden; }

  /* Icon bar */
  .icon-bar {
    width: var(--icon-bar-width);
    background: #0e0e16;
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; align-items: center;
    padding: 4px 0; flex-shrink: 0;
  }
  .icon-bar-top  { display: flex; flex-direction: column; align-items: center; gap: 2px; flex: 1; }
  .icon-bar-bottom { display: flex; flex-direction: column; align-items: center; gap: 2px; padding-bottom: 4px; }
  .icon-btn {
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 6px; cursor: pointer; color: var(--text-muted);
    position: relative; transition: color 0.12s, background 0.12s;
    border: none; background: transparent;
  }
  .icon-btn:hover { color: var(--text-primary); background: var(--bg-hover); }
  .icon-btn.active { color: var(--text-primary); }
  .icon-btn.active::before {
    content: '';
    position: absolute; left: -4px; top: 50%; transform: translateY(-50%);
    width: 2px; height: 20px;
    background: var(--accent); border-radius: 0 2px 2px 0;
  }

  /* Side panel */
  .side-panel {
    width: var(--panel-width);
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden; flex-shrink: 0;
  }

  /* Search bar at top */
  .ext-search-wrap {
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .ext-search-inner {
    display: flex; align-items: center;
    background: #0e0e16;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 5px;
    padding: 4px 8px; gap: 6px;
  }
  .ext-search-inner:focus-within { border-color: var(--accent); }
  .ext-search-icon { color: var(--text-muted); flex-shrink: 0; }
  .ext-search-input {
    flex: 1; background: none; border: none; outline: none;
    font-size: 12px; font-family: inherit; color: var(--text-primary);
  }
  .ext-search-input::placeholder { color: var(--text-muted); }

  /* Section header */
  .section-hdr {
    height: 26px;
    display: flex; align-items: center;
    padding: 0 10px;
    flex-shrink: 0;
    user-select: none;
  }
  .section-hdr-title {
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.07em; color: var(--text-muted);
    text-transform: uppercase; flex: 1;
  }

  /* Package list */
  .pkg-list {
    flex: 1; overflow-y: auto;
  }

  /* Package card */
  .pkg-card {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
    position: relative;
  }
  .pkg-card:hover { background: var(--bg-hover); }
  .pkg-card.installed { opacity: 1; }

  .pkg-card-top {
    display: flex; align-items: flex-start; gap: 10px;
  }
  .pkg-icon {
    width: 32px; height: 32px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700;
    flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .pkg-info { flex: 1; min-width: 0; }
  .pkg-name {
    font-size: 12px; font-weight: 600; color: var(--text-primary);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 2px;
  }
  .pkg-meta {
    display: flex; align-items: center; gap: 6px;
    font-size: 10px; color: var(--text-muted);
  }
  .pkg-version { color: var(--text-muted); }
  .pkg-author  { color: var(--text-muted); }
  .pkg-desc {
    font-size: 11px; color: var(--text-secondary);
    margin-top: 5px; line-height: 1.5;
    display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden;
  }
  .pkg-card-bottom {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 8px;
  }
  .pkg-tags { display: flex; gap: 4px; flex-wrap: wrap; }
  .pkg-tag {
    font-size: 10px; padding: 1px 6px;
    border-radius: 3px;
    background: rgba(255,255,255,0.06);
    color: var(--text-muted);
    border: 1px solid rgba(255,255,255,0.07);
  }

  /* Install button */
  .pkg-install-btn {
    padding: 3px 12px;
    border-radius: 4px; font-size: 11px;
    cursor: pointer; font-family: inherit;
    border: 1px solid rgba(99,102,241,0.5);
    background: rgba(99,102,241,0.15);
    color: var(--accent-light);
    white-space: nowrap; flex-shrink: 0;
    transition: background 0.1s;
  }
  .pkg-install-btn:hover { background: rgba(99,102,241,0.3); }
  .pkg-install-btn.installed {
    border-color: rgba(74,222,128,0.4);
    background: rgba(74,222,128,0.1);
    color: var(--green);
    cursor: default;
  }
  .pkg-install-btn.installing {
    border-color: rgba(245,158,11,0.4);
    background: rgba(245,158,11,0.1);
    color: var(--amber);
    cursor: default;
  }
  .pkg-uninstall-btn {
    padding: 3px 12px;
    border-radius: 4px; font-size: 11px;
    cursor: pointer; font-family: inherit;
    border: 1px solid rgba(255,255,255,0.1);
    background: transparent;
    color: var(--text-muted);
    white-space: nowrap; flex-shrink: 0;
    transition: background 0.1s, color 0.1s, border-color 0.1s;
    display: none;
  }
  .pkg-card:hover .pkg-uninstall-btn { display: block; }
  .pkg-card:hover .pkg-install-btn.installed { display: none; }
  .pkg-uninstall-btn:hover {
    border-color: rgba(244,63,94,0.5);
    background: rgba(244,63,94,0.1);
    color: #f87171;
  }

  /* Installed badge */
  .installed-badge {
    position: absolute; top: 10px; right: 12px;
    font-size: 10px; color: var(--green);
    display: flex; align-items: center; gap: 3px;
  }

  /* Empty state */
  .empty-state {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px; padding: 32px 16px;
    color: var(--text-muted); font-size: 12px; text-align: center;
  }
  .empty-icon { font-size: 28px; opacity: 0.4; }

  /* Dialog */
  .dialog-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6); z-index: 9998;
    display: flex; align-items: center; justify-content: center;
  }
  .dialog {
    background: #1e1e2e;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px; padding: 20px 24px;
    max-width: 360px; width: 100%;
    box-shadow: 0 16px 48px rgba(0,0,0,0.7);
  }
  .dialog-title { font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 10px; }
  .dialog-body  { font-size: 12px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 16px; }
  .dialog-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .btn { padding: 5px 14px; border-radius: 5px; font-size: 12px; cursor: pointer; border: none; font-family: inherit; }
  .btn-ghost  { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); }
  .btn-ghost:hover { border-color: rgba(255,255,255,0.2); color: var(--text-primary); }
  .btn-danger { background: rgba(244,63,94,0.2); border: 1px solid rgba(244,63,94,0.4); color: #f87171; }
  .btn-danger:hover { background: rgba(244,63,94,0.3); }

  /* Main area */
  .main-area { flex: 1; background: var(--bg-base); position: relative; overflow: hidden; }
  .main-placeholder {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); font-size: 12px; letter-spacing: 0.05em;
    background-image: radial-gradient(circle, rgba(255,255,255,0.07) 1px, transparent 1px);
    background-size: 24px 24px;
  }

  /* Status bar */
  .statusbar {
    height: 22px; background: var(--accent);
    display: flex; align-items: center;
    padding: 0 12px; gap: 16px; flex-shrink: 0;
  }
  .statusbar-item { font-size: 11px; color: rgba(255,255,255,0.85); }

  /* Scenario bar */
  .scenario-bar {
    position: fixed; bottom: 30px; right: 16px;
    display: flex; flex-direction: column; gap: 6px; z-index: 200;
  }
  .scenario-btn {
    padding: 5px 12px;
    background: #1e1e2e; border: 1px solid var(--border);
    border-radius: 5px; color: var(--text-secondary);
    font-size: 11px; cursor: pointer; font-family: inherit;
    text-align: left; white-space: nowrap;
  }
  .scenario-btn:hover { border-color: var(--accent); color: var(--accent-light); }
  .scenario-btn.active-scenario { border-color: var(--accent); color: var(--accent-light); background: rgba(99,102,241,0.1); }
</style>
</head>
<body>

<div class="menubar">
  <span class="menubar-title">formuflow</span>
  <span class="menubar-item">File</span>
  <span class="menubar-item">Edit</span>
  <span class="menubar-item">View</span>
  <span class="menubar-item">Run</span>
  <span class="menubar-item">Help</span>
</div>

<div class="app-body">

  <!-- Icon bar -->
  <div class="icon-bar">
    <div class="icon-bar-top">
      <button class="icon-btn" title="Component Tree">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M3 6h4v4H3zM10 6h11M10 12h11M3 14h4v4H3zM10 20h11"/>
        </svg>
      </button>
      <button class="icon-btn" title="Search">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/>
        </svg>
      </button>
      <button class="icon-btn" title="DB Connections">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <ellipse cx="12" cy="5" rx="9" ry="3"/>
          <path d="M3 5v6c0 1.66 4.03 3 9 3s9-1.34 9-3V5"/>
          <path d="M3 11v6c0 1.66 4.03 3 9 3s9-1.34 9-3v-6"/>
        </svg>
      </button>
      <button class="icon-btn active" title="Extensions (Contrib)">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
          <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
          <line x1="12" y1="22.08" x2="12" y2="12"/>
        </svg>
      </button>
    </div>
    <div class="icon-bar-bottom">
      <button class="icon-btn" title="User">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
      </button>
      <button class="icon-btn" title="Settings">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Side panel: Contrib -->
  <div class="side-panel">

    <div class="ext-search-wrap">
      <div class="ext-search-inner">
        <svg class="ext-search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input class="ext-search-input" id="extSearch" placeholder="Packagesを検索..." oninput="onExtSearch(this.value)">
      </div>
    </div>

    <div class="pkg-list" id="pkgList">
      <!-- populated by JS -->
    </div>

  </div>

  <div class="main-area">
    <div class="main-placeholder">← Contribパネルで認識合わせ</div>
  </div>
</div>

<div class="statusbar">
  <span class="statusbar-item">⎇ main</span>
  <span class="statusbar-item" style="margin-left:auto">0 problems</span>
  <span class="statusbar-item">DuckDB ✓</span>
  <span class="statusbar-item">UTF-8</span>
</div>

<!-- Dialog -->
<div class="dialog-overlay" id="dialogOverlay" style="display:none" onclick="closeDialog()">
  <div class="dialog" onclick="event.stopPropagation()" id="dialogBox"></div>
</div>

<!-- Scenario bar -->
<div class="scenario-bar">
  <div style="font-size:10px; color:var(--text-muted); margin-bottom:2px; text-align:right">シナリオ</div>
  <button class="scenario-btn" onclick="showScenario('marketplace', this)">マーケットプレイス</button>
  <button class="scenario-btn" onclick="showScenario('installed', this)">インストール済みのみ</button>
  <button class="scenario-btn" onclick="showScenario('installing', this)">インストール中</button>
  <button class="scenario-btn" onclick="showScenario('uninstall', this)">アンインストールダイアログ</button>
  <button class="scenario-btn" onclick="showScenario('no-result', this)">検索結果なし</button>
</div>

<script>
  // ── Data ────────────────────────────────────────────────────
  const pkgColors = [
    { bg: 'rgba(99,102,241,0.2)',  color: '#a5b4fc' },
    { bg: 'rgba(20,184,166,0.2)',  color: '#5eead4' },
    { bg: 'rgba(244,63,94,0.2)',   color: '#fda4af' },
    { bg: 'rgba(245,158,11,0.2)',  color: '#fcd34d' },
    { bg: 'rgba(6,182,212,0.2)',   color: '#67e8f9' },
  ];

  const allPkgs = [
    {
      id: 'transistor-analysis',
      name: 'transistor-analysis',
      version: '1.2.0',
      author: 'formuflow-labs',
      desc: 'トランジスタのIV特性・ゲイン解析に必要なFormulaセットを提供します。',
      tags: ['formula', 'electronics'],
      installed: true,
      installing: false,
      colorIdx: 0,
      icon: 'TR',
    },
    {
      id: 'signal-processing',
      name: 'signal-processing',
      version: '0.8.1',
      author: 'siglab',
      desc: 'FFT・フィルタリング・周波数解析のFormulaを含むパッケージです。',
      tags: ['formula', 'signal', 'fft'],
      installed: true,
      installing: false,
      colorIdx: 1,
      icon: 'SP',
    },
    {
      id: 'stat-utils',
      name: 'stat-utils',
      version: '2.1.0',
      author: 'formuflow-community',
      desc: '統計処理（平均・分散・正規化・外れ値検出）のFormulaを提供。',
      tags: ['formula', 'statistics'],
      installed: false,
      installing: false,
      colorIdx: 2,
      icon: 'ST',
    },
    {
      id: 'iv-curve-tools',
      name: 'iv-curve-tools',
      version: '0.3.0',
      author: 'device-physics',
      desc: 'IV曲線フィッティング・パラメータ抽出のFlow・Formulaセット。',
      tags: ['flow', 'formula', 'iv'],
      installed: false,
      installing: false,
      colorIdx: 3,
      icon: 'IV',
    },
    {
      id: 'thermal-calc',
      name: 'thermal-calc',
      version: '1.0.2',
      author: 'thermal-labs',
      desc: '熱抵抗・接合温度・デバイス温度計算のFormulaパッケージ。',
      tags: ['formula', 'thermal'],
      installed: false,
      installing: false,
      colorIdx: 4,
      icon: 'TH',
    },
  ];

  // ── Render ──────────────────────────────────────────────────
  let currentFilter = 'all'; // 'all' | 'installed'
  let searchQuery = '';

  function filteredPkgs() {
    let list = allPkgs;
    if (currentFilter === 'installed') list = list.filter(p => p.installed);
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      list = list.filter(p =>
        p.name.toLowerCase().includes(q) ||
        p.desc.toLowerCase().includes(q) ||
        p.tags.some(t => t.includes(q))
      );
    }
    return list;
  }

  function render() {
    const list = document.getElementById('pkgList');
    list.innerHTML = '';

    // Section header
    const hdr = document.createElement('div');
    hdr.className = 'section-hdr';
    const installedCount = allPkgs.filter(p => p.installed).length;
    hdr.innerHTML = `
      <span class="section-hdr-title">${currentFilter === 'installed' ? `インストール済み — ${installedCount}` : 'マーケットプレイス'}</span>
    `;
    list.appendChild(hdr);

    const pkgs = filteredPkgs();
    if (pkgs.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.innerHTML = `<div class="empty-icon">📦</div><div>該当するPackageが見つかりませんでした</div>`;
      list.appendChild(empty);
      return;
    }

    pkgs.forEach(pkg => {
      const c = pkgColors[pkg.colorIdx];
      const card = document.createElement('div');
      card.className = 'pkg-card' + (pkg.installed ? ' installed' : '');

      let actionBtn = '';
      if (pkg.installing) {
        actionBtn = `<button class="pkg-install-btn installing" disabled>Installing...</button>`;
      } else if (pkg.installed) {
        actionBtn = `
          <button class="pkg-install-btn installed">✓ Installed</button>
          <button class="pkg-uninstall-btn" onclick="event.stopPropagation(); showUninstallDialog('${pkg.id}')">Uninstall</button>
        `;
      } else {
        actionBtn = `<button class="pkg-install-btn" onclick="event.stopPropagation(); installPkg('${pkg.id}')">Install</button>`;
      }

      card.innerHTML = `
        <div class="pkg-card-top">
          <div class="pkg-icon" style="background:${c.bg}; color:${c.color}">${pkg.icon}</div>
          <div class="pkg-info">
            <div class="pkg-name">${pkg.name}</div>
            <div class="pkg-meta">
              <span class="pkg-version">v${pkg.version}</span>
              <span>·</span>
              <span class="pkg-author">${pkg.author}</span>
            </div>
          </div>
        </div>
        <div class="pkg-desc">${pkg.desc}</div>
        <div class="pkg-card-bottom">
          <div class="pkg-tags">${pkg.tags.map(t => `<span class="pkg-tag">${t}</span>`).join('')}</div>
          <div style="display:flex;gap:4px">${actionBtn}</div>
        </div>
      `;
      list.appendChild(card);
    });
  }

  // ── Actions ─────────────────────────────────────────────────
  function installPkg(id) {
    const pkg = allPkgs.find(p => p.id === id);
    if (!pkg) return;
    pkg.installing = true;
    render();
    setTimeout(() => {
      pkg.installing = false;
      pkg.installed  = true;
      render();
    }, 1800);
  }

  function showUninstallDialog(id) {
    const pkg = allPkgs.find(p => p.id === id);
    if (!pkg) return;
    const box = document.getElementById('dialogBox');
    box.innerHTML = `
      <div class="dialog-title">Packageのアンインストール</div>
      <div class="dialog-body">
        Packageのcomponent単体を削除することはできません。<br><br>
        Package <b style="color:var(--accent-light)">"${pkg.name}"</b> をアンインストールしますか？
      </div>
      <div class="dialog-actions">
        <button class="btn btn-ghost" onclick="closeDialog()">Cancel</button>
        <button class="btn btn-danger" onclick="uninstallPkg('${id}')">Uninstall</button>
      </div>
    `;
    document.getElementById('dialogOverlay').style.display = 'flex';
  }

  function uninstallPkg(id) {
    const pkg = allPkgs.find(p => p.id === id);
    if (pkg) pkg.installed = false;
    closeDialog();
    render();
  }

  function closeDialog() {
    document.getElementById('dialogOverlay').style.display = 'none';
  }

  function onExtSearch(val) {
    searchQuery = val;
    render();
  }

  // ── Scenarios ───────────────────────────────────────────────
  function showScenario(name, btn) {
    document.querySelectorAll('.scenario-btn').forEach(b => b.classList.remove('active-scenario'));
    btn.classList.add('active-scenario');
    closeDialog();
    document.getElementById('extSearch').value = '';
    searchQuery = '';

    // reset installing state
    allPkgs.forEach(p => p.installing = false);

    if (name === 'marketplace') {
      currentFilter = 'all';
      allPkgs[0].installed = true;
      allPkgs[1].installed = true;
      allPkgs[2].installed = false;
      allPkgs[3].installed = false;
      allPkgs[4].installed = false;
      render();
    }
    if (name === 'installed') {
      currentFilter = 'installed';
      allPkgs[0].installed = true;
      allPkgs[1].installed = true;
      render();
    }
    if (name === 'installing') {
      currentFilter = 'all';
      allPkgs[2].installing = true;
      render();
    }
    if (name === 'uninstall') {
      currentFilter = 'all';
      allPkgs[0].installed = true;
      render();
      setTimeout(() => showUninstallDialog('transistor-analysis'), 50);
    }
    if (name === 'no-result') {
      currentFilter = 'all';
      searchQuery = 'zzznomatch';
      document.getElementById('extSearch').value = 'zzznomatch';
      render();
    }
  }

  // init
  render();
</script>
</body>
</html>
